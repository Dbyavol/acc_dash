<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACC Pilot Cards</title>
    <meta
      name="description"
      content="Статичный сайт с карточками пилотов и лучшими временами на трассах для ACC."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="mode-switcher">
        <div class="nav-links nav-links-centered">
          <button class="nav-toggle is-active" type="button" data-view-target="cards">
            Карточки
          </button>
          <button class="nav-toggle" type="button" data-view-target="tracks">
            Трассы
          </button>
        </div>
      </header>

      <main class="main-dashboard">
        <section class="dashboard-view is-active" data-view="cards">
          <div class="section">
            <div class="section-heading">
              <h2>Карточки пилотов</h2>
            </div>

            <div class="pilot-grid" id="pilot-grid"></div>
          </div>
        </section>

        <section class="dashboard-view" data-view="tracks">
          <div class="section section-tracks">
            <div class="section-heading">
              <h2>Результаты по трассам</h2>
            </div>

            <div class="tracks-layout">
              <aside class="track-selector-panel">
                <div class="panel-head">
                  <p class="pilot-tag">Трассы</p>
                  <h3>Список трасс</h3>
                </div>
                <div class="track-selector" id="track-selector"></div>
              </aside>

              <div class="track-results-panel">
                <div class="track-summary" id="track-summary"></div>

                <div class="records-card track-table-card">
                  <div class="records-card-header">
                    <div>
                      <p class="pilot-tag">Leaderboard</p>
                      <h3 id="track-table-title">Результаты трассы</h3>
                    </div>
                    <div class="records-badge" id="track-table-count">0 пилотов</div>
                  </div>

                  <div class="records-table-wrapper">
                    <table class="records-table">
                      <thead>
                        <tr>
                          <th>Позиция</th>
                          <th>Пилот</th>
                          <th>Номер</th>
                          <th>Время</th>
                          <th>Отставание</th>
                        </tr>
                      </thead>
                      <tbody id="track-results-body"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
